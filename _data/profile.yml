  <p>
  <strong>Hello everyone!</strong> My name is <strong>Antonio Radesca</strong> and I'm a Computer Engineering graduate from the University of Salerno with a passion for building things that actually work. My go-to stack includes C, Java, SQL and Python, but I'm always eager to dive into new challenges and pick up whatever the problem requires.
