  When I'm not staring at code, you'll probably find me strumming my guitar, lost in a video game or a good movie, or playing sports — I'm a firm believer in the power of a good team, both on the field and in the office.
  </p>
  <p>
  I'm a proactive learner and a natural team player, ready to bring both technical skills and positive energy to an environment where I can help build efficient, data-driven solutions.
  </p>

